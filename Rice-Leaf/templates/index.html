<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rice Leaf Disease Detection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      padding-top: 40px;
    }

    .container {
  	max-width: 650px;
  	background: rgba(255, 255, 255, 0.25);  /* Transparent white */
  	padding: 30px;
  	border-radius: 10px;
  	box-shadow: 0 4px 10px rgba(255,255,255,0.2);
  	border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .result-box {
      margin-top: 20px;
      text-align: center;
    }

    .img-preview {
      width: 100%;
      max-width: 300px;
      margin: 15px auto;
      display: block;
    }

    video {
      border-radius: 8px;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="container text-center">
  <h2 class="mb-4"> 🌾 Rice Leaf Disease Detection</h2>

  <form method="POST" enctype="multipart/form-data">
  <!-- Camera and File Upload Buttons Side-by-Side -->
  <div class="d-flex justify-content-center gap-2 flex-wrap mb-3">
    <!-- Use Camera Button -->
    <button class="btn btn-outline-light" type="button" onclick="toggleCamera()">📷 Use Camera</button>

    <!-- Styled File Upload Button -->
    <label class="btn btn-outline-light mb-0">
      📁 Choose File
      <input type="file" id="image" name="image" accept="image/*" hidden required onchange="showFileName(this)">
    </label>
  </div>

  <!-- Camera Section (Initially Hidden) -->
  <div id="camera-section" style="display: none;" class="text-center mb-3">
    <video id="video" autoplay muted playsinline style="max-width: 100%; border: 1px solid #ccc;"></video>
    <br>
    <button class="btn btn-success my-2" type="button" onclick="captureImage()">Capture Image</button>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <p id="filename" class="text-light mt-2"></p>

  <!-- Submit Button -->
  <div class="text-center">
    <button type="submit" class="btn btn-primary">Predict Disease</button>
  </div>
</form>


  {% if prediction %}
  <div class="result-box">
    <h4 class="mt-4">🔍 Prediction Result</h4>
    <img src="{{ img_path }}" class="img-preview img-thumbnail" alt="Leaf Image">
    <p><strong>Disease:</strong> {{ prediction }}</p>
    <p><strong>Confidence:</strong> {{ confidence }}%</p>
  </div>
  {% endif %}
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const imageInput = document.getElementById('image');
  let streamStarted = false;

  async function toggleCamera() {
    const section = document.getElementById('camera-section');
    section.style.display = 'block';

    if (!streamStarted) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        streamStarted = true;
      } catch (err) {
        alert("Camera access denied or not available.");
      }
    }
  }

  function captureImage() {
    const context = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      const file = new File([blob], "capture.jpg", { type: "image/jpeg" });
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(file);
      imageInput.files = dataTransfer.files;
      showFileName(imageInput);
    }, "image/jpeg");
  }

  function showFileName(input) {
  const filenameDisplay = document.getElementById('filename');
  if (input.files && input.files.length > 0) {
    filenameDisplay.textContent = `Selected File: ${input.files[0].name}`;
  } else {
    filenameDisplay.textContent = '';
  }
}

</script>

</body>
</html>
